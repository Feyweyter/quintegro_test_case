services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - app-network

  code-server:
    image: codercom/code-server:latest
    ports:
      - "9090:8080"
    volumes:
      - .:/home/coder/project
    command: --auth none
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
