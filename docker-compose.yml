services:
  nginx:
    image: nginx:alpine
    ports:
      - "8080:8080"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx-static:/usr/share/nginx/static:ro
    depends_on:
      - backend
      - frontend
      - code-server
    networks:
      - app-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    expose:
      - "3000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    expose:
      - "3001"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - app-network

  code-server:
    image: gitpod/openvscode-server:latest
    user: root
    expose:
      - "3000"
    volumes:
      - .:/home/workspace
    command: --without-connection-token --server-base-path /code
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
